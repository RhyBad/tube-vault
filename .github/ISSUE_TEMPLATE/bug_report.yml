name: 🐛 Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes: { label: What happened?, description: Steps, expected vs actual }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: Image version/tag }
  - type: textarea
    id: env
    attributes: { label: Deploy details, description: compose/env (REDACT secrets), logs }
