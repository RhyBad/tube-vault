name: Secret scan
# Low-risk supply-chain guard: block secrets from landing in this public mirror.
# Complements (does not replace) GitHub-native secret scanning + push protection,
# which should also be enabled in repo Settings → Code security.
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0        # full history so pushes/PRs are scanned end-to-end
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free for public repos & individual accounts — no license needed.
          # If this repo ever moves under an ORGANIZATION, add a free key from
          # gitleaks.io: GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
