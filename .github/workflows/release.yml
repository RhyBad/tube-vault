name: Release
on:
  push:
    tags: ["v*"]          # publish snapshot from Gitea pushes vX.Y.Z → this runs
permissions:
  contents: write         # create Release
  packages: write         # push to GHCR
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate locales
        run: node scripts/validate-locales.mjs
      - uses: docker/setup-qemu-action@v3          # arm64 emulation for multi-arch
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .                     # TODO: point at the real Dockerfile/context from the mirrored code
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tubevault:latest
            ghcr.io/${{ github.repository_owner }}/tubevault:${{ github.ref_name }}
      # TODO (optional): cosign sign + SBOM attest for supply-chain trust
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: docker-compose.yml
