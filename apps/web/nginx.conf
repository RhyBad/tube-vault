# TubeVault web (P9): SPA shell + same-origin /api reverse proxy.
# The /api/events SSE block is copied VERBATIM from the gog-vault reference
# (PLAN.md verified fact: proxy_buffering off + Connection '' + 3600s read
# timeout is the proven combination for long-lived EventSource streams).
# SECURITY (P9 audit): X-Forwarded-For is OVERWRITTEN with $remote_addr in
# every proxied block, NEVER built with $proxy_add_x_forwarded_for. The api
# trusts private-range hops ('trust proxy' loopback+uniquelocal), so APPENDING
# the client-supplied XFF would let any LAN client prepend forged IPs — minting
# fresh login-rate-limit buckets per request (limiter evasion) or draining
# another client's bucket (owner lockout). One hop, one truth: $remote_addr.
server {
    # 8080: the nginxinc/nginx-unprivileged base runs non-root and cannot bind 80.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text responses — the static JS/CSS bundle and the proxied /api JSON.
    # text/event-stream is intentionally absent so the /api/events SSE stream is
    # never buffered/compressed, and video/* stays uncompressed by default.
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA fallback. The shell (index.html) MUST be revalidated on every load: it's
    # un-hashed and points at the content-hashed asset bundle, so a browser that
    # heuristically caches it would serve a stale app after a deploy. `no-cache`
    # forces a conditional GET (304 when unchanged; fresh HTML when deployed).
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # Vite emits content-hashed, immutable asset filenames — cache for a year.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SSE stream — must be more specific than /api/ so it matches first.
    location /api/events {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr; # overwrite — see header note
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Media streaming (Range requests from the <video> tag). nginx forwards the
    # Range header and relays 206/Content-Range by default; buffering is turned
    # OFF here on purpose: with it on, nginx spools multi-GB responses to temp
    # files and keeps reading from the api after the player aborts a seek —
    # unbuffered, a client abort propagates straight to the api's stream
    # teardown (its no-fd-leak wiring) and bytes flow with no disk detour.
    location /api/media/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr; # overwrite — see header note
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # API reverse proxy. client_max_body_size: the P8 cookie-jar import
    # (PUT /api/session) allows a 1MiB cookies field inside a JSON body and the
    # api's express json limit is 2mb — nginx must not 413 below that, so 4m
    # gives comfortable headroom (oversized bodies still 413 at the api).
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr; # overwrite — see header note
        client_max_body_size 4m;
    }
}
